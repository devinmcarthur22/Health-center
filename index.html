  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; padding: 0; background-color: #0f1117; font-family: 'Inter', sans-serif; }

    /* Card flip */
    .flip-scene { perspective: 1400px; cursor: pointer; width: 100%; }
    .flip-inner {
      position: relative;
      width: 100%;
      height: 300px;
      transition: transform 0.52s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
    }
    .flip-inner.flipped { transform: rotateY(180deg); }
    .flip-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 36px 40px;
    }
    .flip-face-back { transform: rotateY(180deg); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }

    /* Hover lift on card */
    .flip-scene:hover .flip-inner:not(.flipped) { transform: translateY(-2px); }
    .flip-scene:hover .flip-inner.flipped { transform: rotateY(180deg) translateY(-2px); }

    /* Select styling */
    select option { background: #1a1d27; color: #fff; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40%            { transform: scale(1);   opacity: 1;   }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0);   }
    }
  </style>

    /* ─── HELPERS ────────────────────────────────────────────────── */
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function getFilteredDeck(cat) {
      return FLASHCARD_DATA.filter(c => c.category === cat);

    /* ─── FLASHCARDS MODULE ──────────────────────────────────────── */
    function FlashcardsModule() {
      const initialDeck = getFilteredDeck("Walr Overview");

      const [filterCategory, setFilterCategory] = useState("Walr Overview");
      const [isFlipped, setIsFlipped]           = useState(false);
      const [gotItIds, setGotItIds]             = useState(new Set());
      const [deck, setDeck]                     = useState(initialDeck);
      const [currentIndex, setCurrentIndex]     = useState(0);
      const [deckComplete, setDeckComplete]     = useState(false);

      const total       = deck.length;
      const currentCard = deck[currentIndex];
      const gotItCount  = gotItIds.size;
      const progress    = total > 0 ? Math.round((gotItCount / total) * 100) : 0;
      const cardNum     = currentIndex + 1;

      function resetTo(newDeck) {
        setDeck(newDeck);
        setCurrentIndex(0);
        setGotItIds(new Set());
        setIsFlipped(false);
        setDeckComplete(false);
      }

      function handleFilterChange(cat) {
        setFilterCategory(cat);
        resetTo(getFilteredDeck(cat));
      }

      function handleShuffle() {
        resetTo(shuffle(getFilteredDeck(filterCategory)));
      }

      function goNext() {
        if (currentIndex + 1 >= total) {
          setDeckComplete(true);
        } else {
          setCurrentIndex(i => i + 1);
          setIsFlipped(false);
        }
      }

      function goPrev() {
        if (currentIndex > 0) {
          setCurrentIndex(i => i - 1);
          setIsFlipped(false);
        }
      }

      function handleGotIt() {
        if (!currentCard) return;
        const newGotIt = new Set(gotItIds); newGotIt.add(currentCard.id);
        setGotItIds(newGotIt);
        goNext();
      }

      function handleReviewAgain() {
        if (!currentCard) return;
        const newGotIt = new Set(gotItIds); newGotIt.delete(currentCard.id);
        setGotItIds(newGotIt);
        goNext();
      }

      const btnBase = {

        fontSize: 14, fontWeight: 600, cursor: "pointer",
        fontFamily: "inherit", transition: "all 0.15s",
        display: "flex", alignItems: "center", gap: 8,
      };

      /* ── Summary screen ── */
      if (deckComplete) {
        const pct = Math.round((gotItCount / total) * 100);
        return (

                  flexShrink: 0, minWidth: 130, fontSize: 11, fontWeight: 700,
                  color: t.color, backgroundColor: `${t.color}18`,
                  border: `1px solid ${t.color}40`, borderRadius: 5,
                  padding: "3px 8px", textAlign: "center",
                }}>{t.range}</span>
                <span style={{ fontSize: 13, color: "rgba(255,255,255,0.65)", lineHeight: 1.4 }}>{t.label}</span>
              </div>
            ))}
            {note && <p style={{ margin: "8px 0 0", fontSize: 12, color: "rgba(255,255,255,0.4)", fontStyle: "italic" }}>{note}</p>}
          </div>
        );
      }

      /* ── Variable block ── */
      function VariableBlock({ item }) {
        return (
          <div style={{
            backgroundColor: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)",
            borderRadius: 10, padding: "14px 16px",
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
              <span style={{
                fontSize: 10, fontWeight: 800, letterSpacing: "0.1em", textTransform: "uppercase",
                backgroundColor: "rgba(0,196,167,0.2)", border: "1px solid rgba(0,196,167,0.35)",
                color: "#5ee8d5", padding: "3px 9px", borderRadius: 5,
              }}>{item.key}</span>
              <span style={{ fontSize: 14, fontWeight: 600, color: "#fff" }}>{item.label}</span>
            </div>
            {item.tiers && <TierScale tiers={item.tiers} note={item.note} />}
            {item.formula && (
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                <div style={{
                  backgroundColor: "rgba(0,196,167,0.1)", border: "1px solid rgba(0,196,167,0.25)",
                  borderRadius: 8, padding: "12px 16px", textAlign: "center",
                }}>
                  <span style={{ fontSize: 14, fontWeight: 700, color: "#a8f5eb", fontFamily: "monospace", letterSpacing: "0.02em" }}>
                    {item.formulaText}
                  </span>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <Icon name="ArrowRight" size={13} color="rgba(255,255,255,0.3)" />
                  <span style={{ fontSize: 13, color: "rgba(255,255,255,0.55)", fontStyle: "italic" }}>{item.example}</span>
                </div>
              </div>
            )}
          </div>
        );
      }

      /* ── Section content renderer ── */
      function SectionContent({ content }) {
        if (content.type === "variables") {
          return (
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              {content.items.map((item, i) => <VariableBlock key={i} item={item} />)}
            </div>
          );
        }
        if (content.type === "numbered") {
          return (
            <ol style={{ margin: 0, padding: 0, listStyle: "none", display: "flex", flexDirection: "column", gap: 10 }}>
              {content.items.map(item => (
                <li key={item.n} style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
                  <span style={{
                    flexShrink: 0, width: 26, height: 26, borderRadius: "50%",
                    backgroundColor: "rgba(0,196,167,0.2)", border: "1px solid rgba(0,196,167,0.35)",
                    display: "flex", alignItems: "center", justifyContent: "center",
                    fontSize: 11, fontWeight: 700, color: "#5ee8d5",
                  }}>{item.n}</span>
                  <span style={{ fontSize: 13, color: "rgba(255,255,255,0.75)", lineHeight: 1.65, paddingTop: 4 }}>{item.text}</span>
                </li>
              ))}
            </ol>
          );
        }
        if (content.type === "bullets") {
          return (
            <ul style={{ margin: 0, padding: 0, listStyle: "none", display: "flex", flexDirection: "column", gap: 10 }}>
              {content.items.map((item, i) => (
                <li key={i} style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
                  <span style={{ flexShrink: 0, marginTop: 5 }}>
                    <Icon name="AlertTriangle" size={12} color="#fb923c" />
                  </span>
                  <span style={{ fontSize: 13, color: "rgba(255,255,255,0.75)", lineHeight: 1.65 }}>{item}</span>
                </li>
              ))}
            </ul>
          );
        }
        if (content.type === "walr") {
          return (
            <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                {content.steps.map((step, i) => (
                  <div key={i} style={{
                    backgroundColor: "rgba(0,196,167,0.07)", border: "1px solid rgba(0,196,167,0.18)",
                    borderRadius: 10, padding: "14px 15px", display: "flex", gap: 12, alignItems: "flex-start",
                  }}>
                    <span style={{
                      flexShrink: 0, width: 30, height: 30, borderRadius: 8,
                      backgroundColor: "rgba(0,196,167,0.2)", border: "1px solid rgba(0,196,167,0.3)",
                      display: "flex", alignItems: "center", justifyContent: "center",
                    }}>
                      <Icon name={step.icon} size={14} color="#5ee8d5" />
                    </span>
                    <div>
                      <div style={{ fontSize: 11, fontWeight: 700, color: "#5ee8d5", marginBottom: 4, textTransform: "uppercase", letterSpacing: "0.07em" }}>{step.label}</div>
                      <div style={{ fontSize: 13, color: "rgba(255,255,255,0.65)", lineHeight: 1.55 }}>{step.desc}</div>
                    </div>
                  </div>
                ))}
              </div>
              <div style={{
                background: "linear-gradient(135deg, rgba(0,196,167,0.14) 0%, rgba(0,196,167,0.12) 100%)",
                border: "1px solid rgba(0,196,167,0.32)", borderRadius: 10, padding: "14px 16px",
                display: "flex", gap: 10, alignItems: "flex-start",
              }}>
                <Icon name="Zap" size={15} color="#5ee8d5" style={{ flexShrink: 0, marginTop: 1 }} />
                <p style={{ margin: 0, fontSize: 13, color: "rgba(255,255,255,0.85)", lineHeight: 1.7, fontWeight: 500 }}>
                  {content.callout}
                </p>
              </div>
            </div>
          );
        }
        return null;
      }

      /* ── Accordion item ── */
      function AccordionItem({ section }) {
        const isOpen = !!openSections[section.id];
        return (
          <div style={{
            backgroundColor: "#1a1d27", border: "1px solid rgba(255,255,255,0.08)",
            borderRadius: 12, overflow: "hidden",
            boxShadow: isOpen ? "0 0 0 1px rgba(0,196,167,0.2)" : "none",
            transition: "box-shadow 0.2s",
          }}>
            {/* Header */}
            <button
              onClick={() => toggleSection(section.id)}
              style={{
                width: "100%", display: "flex", alignItems: "center", gap: 12,
                padding: "16px 18px", background: "none", border: "none",
                cursor: "pointer", fontFamily: "inherit", textAlign: "left",
                borderBottom: isOpen ? "1px solid rgba(255,255,255,0.07)" : "none",
                transition: "background-color 0.15s",

            >
              <span style={{

                backgroundColor: isOpen ? "rgba(0,196,167,0.2)" : "rgba(255,255,255,0.06)",
                border: isOpen ? "1px solid rgba(0,196,167,0.3)" : "1px solid rgba(255,255,255,0.1)",
                display: "flex", alignItems: "center", justifyContent: "center",
                transition: "all 0.2s",
              }}>
                <Icon name={section.icon} size={15} color={isOpen ? "#5ee8d5" : "rgba(255,255,255,0.45)"} />
              </span>
              <span style={{ flex: 1, fontSize: 14, fontWeight: 600, color: isOpen ? "#fff" : "rgba(255,255,255,0.75)" }}>
                {section.title}
              </span>
              <span style={{
                flexShrink: 0, width: 22, height: 22, borderRadius: "50%",
                backgroundColor: "rgba(255,255,255,0.06)", border: "1px solid rgba(255,255,255,0.1)",
                display: "flex", alignItems: "center", justifyContent: "center",
                transform: isOpen ? "rotate(180deg)" : "rotate(0deg)", transition: "transform 0.25s",
              }}>
                <Icon name="ChevronDown" size={13} color="rgba(255,255,255,0.4)" />
              </span>
            </button>

            {/* Body */}
            {isOpen && (
              <div style={{ padding: "18px 18px 20px" }}>
                <SectionContent content={section.content} />
              </div>
            )}
          </div>
        );
      }

      /* ── Tab buttons ── */
      const tabs = [
        { id: "overview", label: "Overview",  icon: "LayoutList" },
        { id: "learn",    label: "Learn",     icon: "BookOpen" },
        { id: "quiz",     label: "Quiz",      icon: "HelpCircle" },
      ];

      /* ── Shared styles for Overview ── */
      const OV = {
        sectionDiv:  { marginBottom: 36 },
        divider:     { border: "none", borderTop: "1px solid rgba(255,255,255,0.07)", margin: "32px 0" },
        h3:          { margin: "0 0 10px", fontSize: 16, fontWeight: 700, color: "#fff" },
        body:        { margin: "0 0 12px", fontSize: 13, color: "rgba(255,255,255,0.72)", lineHeight: 1.75 },
        tableWrap:   { backgroundColor: "#1a1d27", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 10, overflow: "hidden", marginBottom: 14 },
        table:       { width: "100%", borderCollapse: "collapse", fontSize: 13 },
        th:          { padding: "9px 14px", textAlign: "left", fontSize: 11, fontWeight: 700, color: "rgba(255,255,255,0.35)", textTransform: "uppercase", letterSpacing: "0.06em", borderBottom: "1px solid rgba(255,255,255,0.08)", backgroundColor: "rgba(255,255,255,0.02)" },
        td:          { padding: "10px 14px", color: "rgba(255,255,255,0.7)", borderBottom: "1px solid rgba(255,255,255,0.05)" },
        tdbold:      { padding: "10px 14px", color: "#fff", fontWeight: 600, borderBottom: "1px solid rgba(255,255,255,0.05)" },
        mentBox:     { backgroundColor: "rgba(0,196,167,0.07)", border: "1px solid rgba(0,196,167,0.3)", borderRadius: 10, padding: "18px 20px", marginBottom: 32 },
        warnBox:     { backgroundColor: "rgba(239,68,68,0.07)", border: "1px solid rgba(239,68,68,0.3)", borderRadius: 10, padding: "12px 16px", marginBottom: 8 },
        calloutBox:  { backgroundColor: "rgba(0,196,167,0.07)", border: "1px solid rgba(0,196,167,0.3)", borderRadius: 10, padding: "16px 18px", marginTop: 12 },
        note:        { backgroundColor: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 10, padding: "12px 16px", marginTop: 10 },
        numItem:     { display: "flex", gap: 12, alignItems: "flex-start", marginBottom: 10 },
        numBadge:    { flexShrink: 0, width: 26, height: 26, borderRadius: "50%", backgroundColor: "rgba(0,196,167,0.2)", border: "1px solid rgba(0,196,167,0.35)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 700, color: "#5ee8d5" },
      };

      function costColor(cost) {
        if (!cost) return "rgba(255,255,255,0.7)";
        const c = cost.toLowerCase();
        if (c.includes("extreme") || c.includes("very high")) return "#fca5a5";
        if (c.includes("high")) return "#fcd34d";
        if (c.includes("moderate") || c.includes("meaningful")) return "#fdba74";
        return "rgba(255,255,255,0.7)";
      }

      return (
        <div style={{ flex: 1, overflow: "auto", padding: "28px 28px 48px" }}>

          <h2 style={{ margin: "0 0 6px", fontSize: 24, fontWeight: 800, color: "#fff" }}>Feasibility & Pricing</h2>
          <p style={{ margin: "0 0 24px", fontSize: 14, color: "rgba(255,255,255,0.4)" }}>How data collection is priced and how to approach looking at feasibility</p>

          {/* Tab bar */}
          <div style={{ display: "flex", gap: 6, marginBottom: 28 }}>
            {tabs.map(tab => {
              const active = activeTab === tab.id;
              return (
                <button
                  key={tab.id}
                  onClick={() => setActiveTab(tab.id)}
                  style={{
                    display: "flex", alignItems: "center", gap: 7,
                    padding: "9px 20px", borderRadius: 10, fontSize: 13, fontWeight: 600,
                    cursor: "pointer", fontFamily: "inherit", border: "none", transition: "all 0.15s",
                    backgroundColor: active ? "#00C4A7" : "#1a1d27",
                    color: active ? "#fff" : "rgba(255,255,255,0.5)",
                    boxShadow: active ? "0 2px 12px rgba(0,196,167,0.35)" : "none",
                    outline: active ? "none" : "1px solid rgba(255,255,255,0.08)",
                  }}
                  onMouseEnter={e => { if (!active) { e.currentTarget.style.backgroundColor = "rgba(255,255,255,0.07)"; e.currentTarget.style.color = "rgba(255,255,255,0.8)"; } }}
                  onMouseLeave={e => { if (!active) { e.currentTarget.style.backgroundColor = "#1a1d27"; e.currentTarget.style.color = "rgba(255,255,255,0.5)"; } }}
                >
                  <Icon name={tab.icon} size={14} color="currentColor" />
                  {tab.label}
                </button>
              );
            })}
          </div>

          {/* ── OVERVIEW TAB ── */}
          {activeTab === "overview" && (
            <div style={{ maxWidth: 820 }}>

              {/* S1 — Mental Shift */}
              <div style={OV.mentBox}>
                <p style={{ margin: "0 0 6px", fontSize: 11, fontWeight: 700, color: "#00C4A7", textTransform: "uppercase", letterSpacing: "0.06em" }}>The Mental Shift: Quantilope vs Walr</p>
                <p style={{ margin: "0 0 10px", fontSize: 13, color: "rgba(255,255,255,0.85)", lineHeight: 1.75 }}>At quantilope the model is built around selling the platform, methodologies, and insights. Pricing is subscription-based — different service tiers, project credits, and multi-year agreements. There's a formula, but at the end of the day it's flexible based on who you are and what you negotiate.</p>
                <p style={{ margin: "0 0 10px", fontSize: 13, color: "rgba(255,255,255,0.85)", lineHeight: 1.75 }}>At Walr you're selling inputs that produce a defined output. The price isn't negotiated — it's calculated. An agency gives you a brief and the brief tells you what it costs. Your job is to understand the brief well enough to know what's driving the cost before ops runs the numbers. That's what quantitative pricing means.</p>
                <p style={{ margin: 0, fontSize: 13, color: "rgba(255,255,255,0.85)", lineHeight: 1.75 }}><span style={{ color: "#00C4A7", fontWeight: 700 }}>The analogy:</span> you're not selling a bespoke suit. You're selling a suit that comes in Bronze, Gold, and Platinum — and the fabric, the cut, and the timeline determine which tier it falls into.</p>
              </div>

              <hr style={OV.divider} />

              {/* S2 — What Feasibility Means */}
              <div style={OV.sectionDiv}>
                <h3 style={OV.h3}>What Feasibility Actually Means at Walr</h3>
                <p style={OV.body}>Feasibility is the question you answer before anything else: can this project be delivered to spec — the right audience, the right n-size, within the right timeline — and what will it take to get there?</p>
                <p style={OV.body}>At a marketplace like Cint, feasibility is often discovered mid-field. You launch and find out whether the audience exists in the panel when quotas start stalling. At Walr, feasibility is assessed and guaranteed before a single respondent is contacted. That guarantee is one of Walr's core differentiators — and understanding how to assess feasibility is the skill that makes you credible in front of an agency buyer before ops ever runs the numbers.</p>
                <p style={{ ...OV.body, margin: 0 }}>Your job as an AE isn't to produce the formal feasibility model — ops does that. Your job is to read a brief, form an instinct about what's hard and why, and set accurate expectations before the quote lands.</p>
              </div>

              <hr style={OV.divider} />

              {/* S3 — Four Variables */}
              <div style={OV.sectionDiv}>
                <h3 style={OV.h3}>The Four Feasibility Variables</h3>

                {/* IR */}
                <p style={{ margin: "16px 0 6px", fontSize: 14, fontWeight: 700, color: "#fff" }}>1. Incidence Rate (IR)</p>
                <p style={OV.body}>What percentage of the general population qualifies for this survey? The single most important variable in data collection pricing.</p>
                <div style={OV.tableWrap}>
                  <table style={OV.table}>
                    <thead><tr><th style={OV.th}>IR Level</th><th style={OV.th}>Difficulty</th></tr></thead>
                    <tbody>
                      {[["50%+","Easy"],["25–50%","Standard"],["10–25%","Moderate"],["5–10%","Hard"],["Sub-5%","Very Hard — always flag before quoting"]].map(([ir,d],i)=>(
                        <tr key={i}><td style={OV.tdbold}>{ir}</td><td style={{...OV.td, color: costColor(d)}}>{d}</td></tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                <div style={OV.note}>
                  <p style={{ margin: "0 0 4px", fontSize: 12, fontWeight: 700, color: "rgba(255,255,255,0.45)" }}>The screens math</p>
                  <p style={{ margin: 0, fontSize: 13, color: "rgba(255,255,255,0.7)", lineHeight: 1.65 }}>500 completes at 50% IR = 1,000 screens &nbsp;·&nbsp; 500 completes at 10% IR = 5,000 screens &nbsp;·&nbsp; 500 completes at 5% IR = 10,000 screens</p>
                </div>

                {/* LOI */}
                <p style={{ margin: "20px 0 6px", fontSize: 14, fontWeight: 700, color: "#fff" }}>2. Length of Interview (LOI)</p>
                <p style={OV.body}>Respondents are compensated for their time. Longer survey = higher incentive = higher CPI. Drop-off also increases with length.</p>
                <div style={OV.tableWrap}>
                  <table style={OV.table}>
                    <thead><tr><th style={OV.th}>LOI</th><th style={OV.th}>Impact</th></tr></thead>
                    <tbody>
                      {[["Under 10 min","Low drop-off — standard"],["10–15 min","Acceptable"],["15–20 min","Meaningful drop-off risk"],["20+ min","High drop-off — flag for feasibility"]].map(([l,d],i)=>(
                        <tr key={i}><td style={OV.tdbold}>{l}</td><td style={{...OV.td, color: costColor(d)}}>{d}</td></tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                <div style={{ ...OV.note, backgroundColor: "rgba(239,68,68,0.06)", border: "1px solid rgba(239,68,68,0.2)" }}>
                  <p style={{ margin: 0, fontSize: 13, color: "#fca5a5", fontWeight: 600 }}>The critical combination: Low IR + Long LOI compounds difficulty fast.</p>
                </div>

                {/* N-Size */}
                <p style={{ margin: "20px 0 6px", fontSize: 14, fontWeight: 700, color: "#fff" }}>3. N-Size</p>
                <p style={OV.body}>N-size drives total project cost linearly. The key formula: <strong style={{ color: "#00C4A7" }}>Screens needed = n-size ÷ IR</strong></p>
                <div style={OV.note}>
                  <p style={{ margin: 0, fontSize: 13, color: "rgba(255,255,255,0.7)", lineHeight: 1.65 }}>Watch for interlocking quota cells — they hide complexity underneath a manageable total n. A project with 500 total completes split across 10 quota cells at 5% IR each is 10 very hard projects, not one easy one.</p>
                </div>

                {/* Audience */}
                <p style={{ margin: "20px 0 6px", fontSize: 14, fontWeight: 700, color: "#fff" }}>4. Audience Type</p>
                <p style={OV.body}>General consumer is the baseline. Everything else is a premium.</p>
                <div style={OV.tableWrap}>
                  <table style={OV.table}>
                    <thead><tr><th style={OV.th}>Audience</th><th style={OV.th}>Relative Cost</th></tr></thead>
                    <tbody>
                      {[
                        ["General consumer 18+","Baseline"],
                        ["Targeted consumer","Low"],
                        ["Category user","Moderate"],
                        ["B2B general","High"],
                        ["B2B senior — Director / VP / C-suite","Very High"],
                        ["Healthcare / licensed professionals","Very High — specialist panel only"],
                        ["Rare behaviors / ultra-niche","Extreme — feasibility check required before quoting"],
                      ].map(([a,c],i)=>(
                        <tr key={i}><td style={OV.td}>{a}</td><td style={{...OV.tdbold, color: costColor(c)}}>{c}</td></tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>

              <hr style={OV.divider} />

              {/* S4 — 8 Questions */}
              <div style={OV.sectionDiv}>
                <h3 style={OV.h3}>The 8 Questions to Ask Before Any Quote</h3>
                <ol style={{ margin: 0, padding: 0, listStyle: "none" }}>
                  {[
                    "What market(s) are you fielding in?",
                    "Who specifically are you trying to reach? (all screener criteria)",
                    "What's the estimated LOI?",
                    "What's the total n-size — and are there quota requirements within that?",
                    "What's the timeline — when does data need to be delivered?",
                    "Is there a hard launch date? (rush = premium)",
                    "Have you fielded this audience type before — do you have a sense of the IR?",
                    "What survey platform are you using, or do you need programming too?",
                  ].map((q,i)=>(
                    <li key={i} style={OV.numItem}>
                      <span style={OV.numBadge}>{i+1}</span>
                      <span style={{ fontSize: 13, color: "rgba(255,255,255,0.75)", lineHeight: 1.65, paddingTop: 4 }}>{q}</span>
                    </li>
                  ))}
                </ol>
              </div>

              <hr style={OV.divider} />

              {/* S5 — Red Flags */}
              <div style={OV.sectionDiv}>
                <h3 style={{ ...OV.h3, marginBottom: 14 }}>Red Flags — Spot Them Before You Quote</h3>
                {[
                  "Low IR + Long LOI — The worst combination. Costs and screens compound on each other.",
                  "B2B with seniority requirements — Director, VP, C-suite at large companies. Real IR is often sub-3% against general population.",
                  "Multiple interlocking quotas on a low-IR study — Each quota cell has its own effective IR which is lower than the overall project IR.",
                  "Highly specific behavioral qualifier — \"Purchased luxury SUV in last 60 days.\" These dramatically shrink the qualifying universe.",
                  "Unrealistic timeline — 500 completes in 24–48 hours on a low-IR study is almost never feasible at quality.",
                  "Narrow geography + small n — Specific DMAs, rural markets, or single cities limit panel supply significantly.",
                  "Specialist professional audience — Healthcare professionals, licensed practitioners, verified experts. Requires Walr's Specialist Opinions panel and dedicated recruitment — not a standard consumer project.",
                ].map((f,i)=>(
                  <div key={i} style={OV.warnBox}>
                    <p style={{ margin: 0, fontSize: 13, color: "rgba(255,200,200,0.9)", lineHeight: 1.65 }}>🚩 {f}</p>
                  </div>
                ))}
              </div>

              <hr style={OV.divider} />

              {/* S6 — How Walr approaches feasibility */}
              <div style={OV.sectionDiv}>
                <h3 style={OV.h3}>How Walr Approaches Feasibility</h3>
                <p style={OV.body}>Most panel providers operate on a launch-and-learn model — you go live and discover problems mid-field. Walr assesses before launch: assess IR against their multi-source panel network, model expected daily complete rate based on panel supply, flag quota risks before go-live, and commit to a guaranteed price, guaranteed timing, and confirmed feasibility.</p>
                <div style={OV.calloutBox}>
                  <p style={{ margin: "0 0 4px", fontSize: 11, fontWeight: 700, color: "#00C4A7", textTransform: "uppercase", letterSpacing: "0.06em" }}>The phrase to use with prospects</p>
                  <p style={{ margin: 0, fontSize: 13, color: "#fff", lineHeight: 1.65, fontStyle: "italic" }}>"We won't send you a quote on something we're not confident we can deliver."</p>
                </div>
              </div>

              <hr style={OV.divider} />

              {/* S7 — CPI Formula */}
              <div style={OV.sectionDiv}>
                <h3 style={OV.h3}>The CPI Formula (Conceptual)</h3>
                <p style={OV.body}>CPI = Cost Per Interview (also called Cost Per Complete). It's the unit price per completed survey response. <strong style={{ color: "#fff" }}>500 completes × CPI = total project cost.</strong></p>
                <div style={OV.tableWrap}>
                  <table style={OV.table}>
                    <tbody>
                      {[
                        ["Base CPI","Standard consumer, 10-min LOI, 50% IR, 5-day field"],
                        ["+ IR adjustment","Lower IR = higher CPI"],
                        ["+ LOI adjustment","Longer = higher CPI"],
                        ["+ Audience premium","B2B and specialist = higher"],
                        ["+ Geography adjustment","Some markets cost more"],
                        ["+ Timeline premium","Rush = premium"],

    function ObjectionHandlerModule() {

      const [copied,      setCopied]      = useState(null);

      /* Click a preset pill — toggle accordion, instant, no API */
      function selectPreset(obj) {
        if (activeLabel === obj.label) {
          setActiveLabel(null);
          setResults(null);
        } else {
          setActiveLabel(obj.label);
          setInput("");
          setError(null);
          setResults({ acknowledge_reframe: obj.acknowledge_reframe, cost_of_inaction: obj.cost_of_inaction, proof_point: obj.proof_point });
        }
      }

      /* Custom input — AI generation */
      async function handleSubmit() {
        if (!input.trim() || loading) return;
        setActiveLabel(null);
        setLoading(true); setError(null); setResults(null);
        try {
          const sp = GLOBAL_SYSTEM_PROMPT + ` The user is facing this sales objection from a research agency prospect: "${input.trim()}". Return exactly three responses in JSON format with keys: acknowledge_reframe, cost_of_inaction, proof_point. Each response should be 2-4 sentences, direct, non-pushy, and grounded in Walr's service-first positioning and Human-in-the-Loop model. Return JSON only, no preamble.`;
          const text = await callClaude(sp, [{ role: "user", content: input.trim() }]);
          setResults(parseJSON(text));
        } catch(e) { setError("Something went wrong — please try again."); }
        setLoading(false);
      }

      function copyText(text, key) {
        navigator.clipboard.writeText(text).catch(() => {});

    function DiscoverySimulatorModule() {
      const [phase,          setPhase]          = useState("persona");

      const [messages,       setMessages]       = useState([]);
      const [inputVal,       setInputVal]       = useState("");

      const chatEndRef = React.useRef(null);

      React.useEffect(() => {
        if (chatEndRef.current) chatEndRef.current.scrollIntoView({ behavior: "smooth" });
      }, [messages, typing]);

      async function startChat(p) {
        setPersona(p); setMessages([]); setInputVal(""); setError(null); setPhase("chat");
        setTyping(true);
        try {
          const sp = GLOBAL_SYSTEM_PROMPT + " " + p.systemAddition + " The Walr AE has just joined the call and said hello. Open the conversation with 1-2 sentences as this persona would naturally start — brief, realistic, slightly guarded or busy.";
          const text = await callClaude(sp, [{ role: "user", content: "Hello, thanks for taking the time to speak with me today." }]);
          setMessages([{ role: "assistant", content: text }]);
        } catch(e) { setError("Could not start simulation — please try again."); }
        setTyping(false);
      }

      async function sendMessage() {
        if (!inputVal.trim() || typing) return;
        const userMsg = inputVal.trim();
        setInputVal("");
        const newMsgs = [...messages, { role: "user", content: userMsg }];
        setMessages(newMsgs); setTyping(true); setError(null);
        try {
          const sp = GLOBAL_SYSTEM_PROMPT + " " + persona.systemAddition + " Continue the conversation. Respond naturally and realistically (2-4 sentences). Show gradual trust only if earned. Do not break character.";
          const text = await callClaude(sp, newMsgs);
          setMessages(prev => [...prev, { role: "assistant", content: text }]);
        } catch(e) { setError("Response failed — try again."); }
        setTyping(false);
      }

      async function endCall() {
        setDebriefLoading(true); setPhase("debrief");
        try {
          const conv = messages.map(m => `${m.role === "user" ? "AE" : "Prospect"}: ${m.content}`).join("\n");
          const sp = GLOBAL_SYSTEM_PROMPT + ` The user just completed a Walr discovery call simulation with persona: ${persona.name} (${persona.desc}). Review the full conversation and provide a structured debrief. Return JSON with these exact keys: pain_points_uncovered (string), walr_positioning_used (string), question_quality (string), missed_opportunities (string), overall_score (number 1-10), score_reasoning (string). Be specific and honest — this is coaching, not praise. Return JSON only, no preamble.`;
          const text = await callClaude(sp, [{ role: "user", content: conv || "The AE ended the call without sending any messages." }]);
          setDebrief(parseJSON(text));
        } catch(e) { setError("Debrief failed — sorry about that."); }
        setDebriefLoading(false);

              {typing && (

                </div>
              )}
              {error && <p style={{ fontSize: 12, color: "#f87171", textAlign: "center", margin: 0 }}>{error}</p>}
              <div ref={chatEndRef} />
            </div>

            {/* Input */}
            <div style={{ padding: "12px 18px", borderTop: "1px solid rgba(255,255,255,0.07)", display: "flex", gap: 10, flexShrink: 0 }}>
              <input
                value={inputVal}
                onChange={e => setInputVal(e.target.value)}
                onKeyDown={e => e.key === "Enter" && !e.shiftKey && sendMessage()}
                placeholder="Your response to the prospect..."
                disabled={typing}
                style={{ flex: 1, backgroundColor: "#1a1d27", border: "1px solid rgba(255,255,255,0.12)", borderRadius: 10, padding: "11px 15px", fontSize: 13, color: "#fff", fontFamily: "inherit", outline: "none", opacity: typing ? 0.5 : 1 }}
              />
              <button

      const DIFF_COLORS  = { Easy: "#4ade80", Moderate: "#fbbf24", Hard: "#fb923c", "Very Hard": "#f87171" };

      async function getScenario() {
        setLoadingScen(true); setError(null); setDiffAnswer(null); setDriverAnswer(null); setGrade(null);
        try {
          const sp = GLOBAL_SYSTEM_PROMPT + " Generate a realistic data collection project brief for a Walr AE training quiz. Return JSON with keys: scenario (2-3 sentence project description including audience, n-size, LOI, market, and timeline), correct_difficulty (Easy/Moderate/Hard/Very Hard), primary_cost_driver (Incidence Rate/Length of Interview/Audience Type/Timeline), explanation (2-3 sentences explaining why). Make it specific and realistic — vary difficulty across generations. Return JSON only, no preamble.";
          const text = await callClaude(sp, [{ role: "user", content: "Generate a new scenario." }]);
          setScenario(parseJSON(text)); setPhase("scenario");
        } catch(e) { setError("Could not generate scenario — please try again."); }
        setLoadingScen(false);
      }

      async function submitAnswer() {
        if (!diffAnswer || !driverAnswer) return;
        setLoadingGrade(true); setError(null);
        try {
          const sp = GLOBAL_SYSTEM_PROMPT + ` The trainee was shown this scenario: "${scenario.scenario}". They answered difficulty: "${diffAnswer}" and primary cost driver: "${driverAnswer}". The correct answers are difficulty: "${scenario.correct_difficulty}" and primary cost driver: "${scenario.primary_cost_driver}". Return JSON with keys: difficulty_correct (boolean), cost_driver_correct (boolean), feedback (3-4 sentences of specific coaching on their reasoning). Return JSON only, no preamble.`;
          const text = await callClaude(sp, [{ role: "user", content: "Grade this answer." }]);
          const result = parseJSON(text);
          setGrade(result);
          const pts = (result.difficulty_correct ? 1 : 0) + (result.cost_driver_correct ? 1 : 0);
          setScore(s => ({ correct: s.correct + pts, total: s.total + 2 }));
          setPhase("answered");
        } catch(e) { setError("Grading failed — please try again."); }
        setLoadingGrade(false);
      }

      /* Start screen */
      if (phase === "start") {
        return (
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", minHeight: 340, gap: 16 }}>
            <div style={{ width: 56, height: 56, borderRadius: 16, backgroundColor: "rgba(0,196,167,0.15)", border: "1px solid rgba(0,196,167,0.3)", display: "flex", alignItems: "center", justifyContent: "center" }}>
              <Icon name="Target" size={24} color="#5ee8d5" />
            </div>
            <div style={{ textAlign: "center" }}>
              <h3 style={{ margin: "0 0 6px", fontSize: 17, fontWeight: 700, color: "#fff" }}>Feasibility Quiz</h3>

              </p>
            </div>
            <button
              onClick={getScenario} disabled={loadingScen}
              style={{
                padding: "12px 28px", borderRadius: 10, border: "none",
                backgroundColor: loadingScen ? "rgba(0,196,167,0.4)" : "#00C4A7",
                color: "#fff", fontSize: 14, fontWeight: 700, cursor: loadingScen ? "not-allowed" : "pointer",

            </button>
            {error && <p style={{ margin: 0, fontSize: 12, color: "#f87171" }}>{error}</p>}
          </div>
        );
      }

      /* Scenario + answer */
      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          {/* Score bar */}
          <div style={{ display: "flex", justifyContent: "flex-end" }}>
            <div style={{ backgroundColor: "#1a1d27", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 8, padding: "5px 13px", display: "flex", alignItems: "center", gap: 6 }}>

              <span style={{ fontSize: 11, fontWeight: 600, color: "#5ee8d5" }}>{score.correct} / {score.total} pts</span>
            </div>
          </div>

          {/* Scenario card */}
          <div style={{ backgroundColor: "#1a1d27", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 14, padding: "18px 20px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 10 }}>
              <Icon name="FileText" size={13} color="#94a3b8" />

            <p style={{ margin: 0, fontSize: 14, color: "rgba(255,255,255,0.88)", lineHeight: 1.7 }}>{scenario.scenario}</p>

                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  {DIFFICULTIES.map(d => {

                        padding: "9px 20px", borderRadius: 8,

                        color: sel ? c : "rgba(255,255,255,0.6)",

              </div>

              {/* Cost driver */}
              <div>
                <p style={{ margin: "0 0 9px", fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.09em", color: "rgba(255,255,255,0.4)" }}>Primary cost driver?</p>

                        color: sel ? "#5ee8d5" : "rgba(255,255,255,0.6)",

              </div>

              <button
                onClick={submitAnswer} disabled={!diffAnswer || !driverAnswer || loadingGrade}
                style={{
                  alignSelf: "flex-start", padding: "11px 26px", borderRadius: 10, border: "none",

              >
                {loadingGrade
                  ? <><span style={{ width: 14, height: 14, border: "2px solid rgba(255,255,255,0.3)", borderTopColor: "#fff", borderRadius: "50%", animation: "spin 0.8s linear infinite", display: "inline-block" }} /> Grading…</>
                  : "Submit Answer"}
              </button>
              {error && <p style={{ margin: 0, fontSize: 12, color: "#f87171" }}>{error}</p>}

          )}

          {phase === "answered" && grade && (
            <div style={{ display: "flex", flexDirection: "column", gap: 12, animation: "fadeIn 0.3s ease" }}>
              {/* Result chips */}
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                {[
                  { label: "Difficulty",   correct: grade.difficulty_correct,   yours: diffAnswer,    answer: scenario.correct_difficulty },
                  { label: "Cost Driver",  correct: grade.cost_driver_correct,   yours: driverAnswer,  answer: scenario.primary_cost_driver },

                  <div key={r.label} style={{
                    borderRadius: 12, padding: "13px 15px",
                    backgroundColor: r.correct ? "rgba(74,222,128,0.07)" : "rgba(248,113,113,0.07)",
                    border: `1px solid ${r.correct ? "rgba(74,222,128,0.2)" : "rgba(248,113,113,0.2)"}`,
                  }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6 }}>
                      <Icon name={r.correct ? "CheckCircle" : "XCircle"} size={13} color={r.correct ? "#4ade80" : "#f87171"} />
                      <span style={{ fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", color: r.correct ? "#4ade80" : "#f87171" }}>{r.label}</span>
                    </div>
                    <div style={{ fontSize: 12, color: "rgba(255,255,255,0.5)", marginBottom: r.correct ? 0 : 3 }}>Your answer: <span style={{ color: "rgba(255,255,255,0.8)", fontWeight: 600 }}>{r.yours}</span></div>
                    {!r.correct && <div style={{ fontSize: 12, color: "rgba(255,255,255,0.5)" }}>Correct: <span style={{ color: "#4ade80", fontWeight: 600 }}>{r.answer}</span></div>}
                  </div>
                ))}
              </div>

              {/* Coaching callout */}
              <div style={{ background: "linear-gradient(135deg, rgba(0,196,167,0.12) 0%, rgba(0,196,167,0.1) 100%)", border: "1px solid rgba(0,196,167,0.28)", borderRadius: 12, padding: "14px 16px" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 8 }}>
                  <Icon name="Zap" size={13} color="#5ee8d5" />
                  <span style={{ fontSize: 10, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.09em", color: "#5ee8d5" }}>Coaching</span>
                </div>
                <p style={{ margin: 0, fontSize: 13, color: "rgba(255,255,255,0.82)", lineHeight: 1.7 }}>{grade.feedback}</p>
              </div>

              <button
                onClick={getScenario} disabled={loadingScen}
                style={{
                  alignSelf: "flex-start", padding: "10px 22px", borderRadius: 10, border: "none",
                  backgroundColor: loadingScen ? "rgba(0,196,167,0.4)" : "#00C4A7",
                  color: "#fff", fontSize: 13, fontWeight: 700,
                  cursor: loadingScen ? "not-allowed" : "pointer",
                  fontFamily: "inherit", display: "flex", alignItems: "center", gap: 7,
                }}
              >
                {loadingScen
                  ? <><span style={{ width: 14, height: 14, border: "2px solid rgba(255,255,255,0.3)", borderTopColor: "#fff", borderRadius: "50%", animation: "spin 0.8s linear infinite", display: "inline-block" }} /> Loading…</>
                  : <><Icon name="ArrowRight" size={14} color="#fff" /> Next Scenario</>}
              </button>
            </div>
          )}
        </div>
      );
    }

    function ThirtyNinetyPlanModule() {
      const [activeTab, setActiveTab] = useState(0);
      const [expanded, setExpanded] = useState({});
      const [checked, setChecked] = useState({});

      const phase = PLAN_PHASES[activeTab];

      const toggleExpand = (phaseIdx, cardIdx) => {
        const key = `${phaseIdx}-${cardIdx}`;
        setExpanded(prev => ({ ...prev, [key]: !prev[key] }));
      };

      const toggleCheck = (phaseIdx, goalIdx) => {
        const key = `${phaseIdx}-${goalIdx}`;
        setChecked(prev => ({ ...prev, [key]: !prev[key] }));
      };

      const completedCount = phase.goals.filter((_, i) => checked[`${activeTab}-${i}`]).length;

        <div style={{ flex: 1, overflowY: "auto", padding: "28px 32px" }}>

                  onClick={() => setActiveTab(i)}
                  style={{
                    padding: "10px 20px",
                    borderRadius: "8px 8px 0 0",
                    border: "none",
                    cursor: "pointer",
                    fontWeight: 600,
                    fontSize: 13,
                    background: activeTab === i ? "rgba(0,196,167,0.1)" : "transparent",
                    color: activeTab === i ? "#00C4A7" : "rgba(255,255,255,0.4)",

            </div>

            {/* Phase headline */}
            <div style={{ marginBottom: 28 }}>
              <h2 style={{ margin: "0 0 6px", fontSize: 28, fontWeight: 800, color: "#00C4A7", letterSpacing: "-0.01em" }}>
                {phase.headline}
              </h2>
              <p style={{ margin: "0 0 14px", fontSize: 11, fontWeight: 700, color: "rgba(255,255,255,0.4)", textTransform: "uppercase", letterSpacing: "0.08em" }}>
                {phase.theme}

                    key={i}
                    onClick={() => toggleExpand(activeTab, i)}

                      border: `1px solid ${isOpen ? "rgba(0,196,167,0.2)" : "rgba(255,255,255,0.07)"}`,

                      padding: "14px 16px",
                      cursor: "pointer",

    function HomeModule({ onNavigate }) {
      const [hoveredId, setHoveredId] = useState(null);
      const sections = ["Game Plan", "Knowledge", "Practice"];
      return (
        <div style={{ flex: 1, overflowY: "auto", padding: "40px 40px 60px" }}>
          <h1 style={{ margin: "0 0 6px", fontSize: 30, fontWeight: 800, color: "#fff", letterSpacing: "-0.02em" }}>

            <div key={section} style={{ marginBottom: 36 }}>
